name: Nightly Automation Tests

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 8 1 * *"
  workflow_dispatch:

jobs:
  nightly-regression:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    name: Nightly regression (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    env:
      CI: "true"
      E2E_BASE_URL: "http://127.0.0.1:3000"
      E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      INSIGHTS_API_TOKEN: ${{ secrets.INSIGHTS_API_TOKEN }}
      PW_NIGHTLY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Validate required fixture env
        run: npm run test:e2e:audit:fixtures

      - name: Run full suite (except quarantined)
        run: npm run test:e2e -- --grep-invert @quarantine

      - name: Collect Playwright KPIs
        if: always()
        run: npm run test:e2e:metrics

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  zero-drift-audit:
    if: github.event.schedule == '0 8 1 * *'
    name: Monthly selector and fixture audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fixture integrity check
        run: node scripts/fixture-integrity-check.mjs

      - name: Selector audit
        run: node scripts/selector-audit.mjs
