name: PR Automation Tests

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  pr-smoke:
    name: PR smoke (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    env:
      CI: "true"
      E2E_BASE_URL: "http://127.0.0.1:3000"
      E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      INSIGHTS_API_TOKEN: ${{ secrets.INSIGHTS_API_TOKEN }}
      PW_NIGHTLY: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Validate required fixture env
        run: npm run test:e2e:audit:fixtures

      - name: Run smoke suite
        run: npm run test:e2e:smoke

      - name: Collect Playwright KPIs
        if: always()
        run: npm run test:e2e:metrics

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
